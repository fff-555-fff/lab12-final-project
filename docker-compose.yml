version: '3.8'

services:
  # ===== 个人网站 =====
  personal-website:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-3254884209}/personal-website:latest
    container_name: personal-website
    ports:
      - "8080:80"
    networks:
      - lab12-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

