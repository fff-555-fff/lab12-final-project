<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张培然 | Peiran Zhang</title>
    <style>
        /* ===== Reset & Base ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a1a;
            overflow: hidden;
            position: relative;
        }

        /* ===== 动态渐变背景 ===== */
        .bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #0a0a1a, #1a0533, #0d1b2a, #1a0a2e);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            25%  { background-position: 50% 0%; }
            50%  { background-position: 100% 50%; }
            75%  { background-position: 50% 100%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== 浮动粒子 ===== */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }
        @keyframes float {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ===== 光晕 ===== */
        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .glow-1 {
            width: 500px; height: 500px;
            background: rgba(120, 80, 255, 0.25);
            top: -150px; right: -100px;
            animation: glowPulse 6s ease-in-out infinite alternate;
        }
        .glow-2 {
            width: 400px; height: 400px;
            background: rgba(0, 200, 255, 0.15);
            bottom: -100px; left: -100px;
            animation: glowPulse 8s ease-in-out infinite alternate-reverse;
        }
        @keyframes glowPulse {
            0%   { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.4) translate(30px, -30px); }
        }

        /* ===== 主卡片 ===== */
        .card {
            position: relative;
            z-index: 2;
            width: 420px;
            max-width: 90vw;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 48px 40px 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5),
                        inset 0 1px 0 rgba(255,255,255,0.06);
            animation: cardEntry 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform: translateY(40px);
            opacity: 0;
        }

        @keyframes cardEntry {
            to { transform: translateY(0); opacity: 1; }
        }

        /* ===== 照片区 ===== */
        .avatar-wrapper {
            position: relative;
            width: 150px; height: 150px;
            margin: 0 auto 28px;
        }
        .avatar-ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #7850ff, #00c8ff, #ff50a0, #7850ff
            );
            animation: spin 4s linear infinite;
        }
        .avatar-ring-inner {
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: #0a0a1a;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .avatar {
            position: relative;
            width: 150px; height: 150px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            z-index: 1;
            transition: transform 0.4s ease;
        }
        .avatar:hover {
            transform: scale(1.06);
        }

        /* ===== 文字 ===== */
        .name {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #fff, #a78bfa, #60a5fa);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .pinyin {
            font-size: 16px;
            color: rgba(255,255,255,0.45);
            margin-bottom: 20px;
            letter-spacing: 3px;
            font-weight: 300;
        }
        .divider {
            width: 60px; height: 2px;
            margin: 0 auto 20px;
            background: linear-gradient(90deg, transparent, #7850ff, transparent);
            border-radius: 2px;
        }

        .info-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: rgba(255,255,255,0.7);
            font-size: 15px;
            margin-bottom: 12px;
            padding: 10px 18px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .info-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(120, 80, 255, 0.3);
            transform: translateX(4px);
        }
        .info-item .icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }
        .info-item .label {
            color: rgba(255,255,255,0.35);
            font-size: 13px;
        }
        .info-item .value {
            color: #c4b5fd;
            font-weight: 500;
        }

        .badge {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            background: linear-gradient(135deg, rgba(120,80,255,0.2), rgba(0,200,255,0.15));
            border: 1px solid rgba(120,80,255,0.25);
            color: #a78bfa;
            animation: badgePulse 3s ease-in-out infinite;
        }
        @keyframes badgePulse {
            0%, 100% { box-shadow: 0 0 8px rgba(120,80,255,0.2); }
            50% { box-shadow: 0 0 20px rgba(120,80,255,0.4); }
        }

        /* ===== Footer ===== */
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
        }

        /* ===== 打字效果 ===== */
        .typing-line {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 20px;
            min-height: 22px;
        }
        .typing-line .cursor {
            display: inline-block;
            width: 2px;
            height: 16px;
            background: #7850ff;
            margin-left: 2px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- 背景 -->
    <div class="bg"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <!-- 粒子 -->
    <div class="particles" id="particles"></div>

    <!-- 主卡片 -->
    <div class="card">
        <div class="avatar-wrapper">
            <div class="avatar-ring"></div>
            <div class="avatar-ring-inner"></div>
            <img src="photo.jpg" alt="张培然" class="avatar">
        </div>

        <div class="name">张培然</div>
        <div class="pinyin">ZHANG PEIRAN</div>

        <div class="divider"></div>

        <div class="typing-line" id="typing"></div>

        <div class="info-item">
            <span class="icon">🎓</span>
            <span class="label">Student ID</span>
            <span class="value">20242205</span>
        </div>
        <div class="info-item">
            <span class="icon">🏫</span>
            <span class="label">School</span>
            <span class="value">北方民族大学 · 计算机</span>
        </div>
        <div class="info-item">
            <span class="icon">🤝</span>
            <span class="label">Program</span>
            <span class="value">CMU × NMU</span>
        </div>

        <span class="badge">🚀 Lab 12 Final Project</span>

        <div class="footer">✦ 2026 · Basic Development and Operation ✦</div>
    </div>

    <script>
        // ===== 粒子生成 =====
        (function() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
                p.style.animationDuration = (12 + Math.random() * 20) + 's';
                p.style.animationDelay = (Math.random() * 20) + 's';
                container.appendChild(p);
            }
        })();

        // ===== 打字效果 =====
        const phrases = [
            '❝ Code is poetry ✦ ❞',
            '❝ 学习 · 成长 · 创造 ❞',
            '❝ DevOps in progress... ❞',
        ];
        let idx = 0, charIdx = 0, isDeleting = false;
        const el = document.getElementById('typing');

        function typeEffect() {
            const current = phrases[idx];
            if (!isDeleting) {
                el.innerHTML = current.slice(0, charIdx + 1) + '<span class="cursor"></span>';
                charIdx++;
                if (charIdx === current.length) {
                    setTimeout(() => { isDeleting = true; typeEffect(); }, 2000);
                    return;
                }
                setTimeout(typeEffect, 80);
            } else {
                el.innerHTML = current.slice(0, charIdx - 1) + '<span class="cursor"></span>';
                charIdx--;
                if (charIdx === 0) {
                    isDeleting = false;
                    idx = (idx + 1) % phrases.length;
                    setTimeout(typeEffect, 400);
                    return;
                }
                setTimeout(typeEffect, 40);
            }
        }
        setTimeout(typeEffect, 1200);
    </script>
</body>
</html>
